name: Publish container image

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags and labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Set up QEMU for HAOS arm64 image
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push one-shot image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Containerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Compute HAOS add-on image tags and labels
        id: haos_meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}-haos
          tags: |
            type=raw,value=0.1.3
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push HAOS add-on image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          build-args: |
            BUILD_VERSION=0.1.3
          push: true
          tags: ${{ steps.haos_meta.outputs.tags }}
          labels: ${{ steps.haos_meta.outputs.labels }}
          cache-from: type=gha,scope=haos
          cache-to: type=gha,mode=max,scope=haos
